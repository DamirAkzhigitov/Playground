# Cloudflare Pages configuration
# This file is optional if using GitHub Actions for deployment
# For direct deployment via Wrangler CLI, configure your project here
#
# Pages Functions live in ./functions (sibling of dist). Deploy from apps/main
# so Wrangler bundles them (see README deploy commands).
#
# Secrets for /api/stats (zone visit counts via GraphQL):
#   wrangler pages secret put CF_API_TOKEN --project-name playground
#   wrangler pages secret put CF_ZONE_ID --project-name playground
# Token needs Zone → Analytics → Read for the da-mr.com zone.

name = "playground"
compatibility_date = "2024-01-01"

[env.production]
name = "playground"

# Pages configuration
pages_build_output_dir = "dist"
