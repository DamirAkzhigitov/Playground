name = "apartments-api"
main = "src/index.ts"
compatibility_date = "2025-05-11"

# Vite client build output (apps/apartments/dist). Same Worker serves SPA + /api — no CORS.
[assets]
directory = "../dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "apartments-db"
database_id = "6b2a6bb6-64b3-4f31-a1da-959f1169b87b"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "apartments-photos"
