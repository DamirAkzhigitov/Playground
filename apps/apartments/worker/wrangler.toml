name = "apartments-api"
main = "src/index.ts"
compatibility_date = "2026-05-11"
preview_urls = false

[[routes]]
pattern = "apartments.da-mr.com"
zone_name = "da-mr.com"
custom_domain = true

# Vite client build output (apps/apartments/dist). Same Worker serves SPA + /api — no CORS.
[assets]
directory = "../dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "apartments-db"
database_id = "6b2a6bb6-64b3-4f31-a1da-959f1169b87b"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "apartments-photos"
jurisdiction = "eu"

[vars]
# Override model if needed; API key is a secret: `wrangler secret put OPENAI_API_KEY`
OPENAI_LISTING_MODEL = "gpt-4o-mini"

[observability]
enabled = true

[observability.logs]
enabled = true

# Production deploy: wrangler deploy. Dev deploy: wrangler deploy --env dev
# Dev: R2 `apartments-photos-dev`, Worker `apartments-api-dev`, domain dev-apartments.da-mr.com.
[env.dev]
name = "apartments-api-dev"

[[env.dev.routes]]
pattern = "dev-apartments.da-mr.com"
zone_name = "da-mr.com"
custom_domain = true

[[env.dev.d1_databases]]
binding = "DB"
database_name = "apartments-db-dev"
database_id = "bac8f817-afe9-475b-9165-34a926e9bd40"
migrations_dir = "migrations"

[[env.dev.r2_buckets]]
binding = "PHOTOS"
bucket_name = "apartments-photos-dev"
jurisdiction = "eu"

# Same SPA + /api layout as prod; required on `wrangler deploy --env dev` so ASSETS is provisioned.
[env.dev.assets]
directory = "../dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*"]
