name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  pr-checks:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm turbo run type-check
        continue-on-error: true

      - name: Test with coverage
        run: pnpm turbo run test:coverage

      - name: Security audit
        run: pnpm run security:audit
        continue-on-error: true

      - name: Build verification
        run: |
          pnpm turbo run build
          if [ ! -d "apps/main/dist" ]; then
            echo "Error: build failed — apps/main/dist not created"
            exit 1
          fi
          echo "Build successful — apps/main/dist created"
