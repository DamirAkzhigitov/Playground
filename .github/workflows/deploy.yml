name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-main:
    name: Deploy apps/main to Cloudflare Pages
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/main
        run: pnpm turbo run build --filter=@playground/main

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/main/dist --project-name=playground --branch=main
          workingDirectory: '.'
          packageManager: pnpm

  deploy-resume:
    name: Deploy apps/resume to Cloudflare Pages
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://resume.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/resume
        run: pnpm turbo run build --filter=@playground/resume

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/resume/dist --project-name=resume --branch=main
          workingDirectory: '.'
          packageManager: pnpm
