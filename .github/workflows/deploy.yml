name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('deploy-dev-pr-{0}', github.event.pull_request.number) || format('deploy-prod-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      main: ${{ steps.filter.outputs.main }}
      resume: ${{ steps.filter.outputs.resume }}
      compare: ${{ steps.filter.outputs.compare }}
      image_gen: ${{ steps.filter.outputs.image_gen }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Enough history for dorny/paths-filter to diff push.before..HEAD reliably.
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Same branch as the push: compare only against the previous tip (paths-filter README).
          # Omit deploy.yml from filters below: one workflow edit matches every app otherwise.
          base: ${{ github.ref }}
          filters: |
            main:
              - 'apps/main/**'
              - 'packages/global-header/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            resume:
              - 'apps/resume/**'
              - 'packages/global-header/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            compare:
              - 'apps/compare/**'
              - 'packages/global-header/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            image_gen:
              - 'apps/image-gen/**'
              - 'packages/global-header/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  deploy-main:
    name: Deploy apps/main to Cloudflare Pages
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect-changes.outputs.main == 'true'
    environment:
      name: production
      url: https://da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/main
        run: pnpm turbo run build --filter=@playground/main
        env:
          VITE_MAIN_ORIGIN: https://da-mr.com
          VITE_RESUME_ORIGIN: https://resume.da-mr.com
          VITE_COMPARE_ORIGIN: https://compare.da-mr.com
          VITE_IMAGE_GEN_ORIGIN: https://image-gen.da-mr.com

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/main/dist --project-name=playground --branch=main --commit-dirty=true
          workingDirectory: '.'
          packageManager: pnpm

  deploy-main-dev:
    name: Deploy apps/main to Cloudflare Pages (dev)
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.detect-changes.outputs.main == 'true'
    environment:
      name: development
      url: https://dev.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/main
        run: pnpm turbo run build --filter=@playground/main
        env:
          VITE_MAIN_ORIGIN: https://dev.da-mr.com
          VITE_RESUME_ORIGIN: https://dev-resume.da-mr.com
          VITE_COMPARE_ORIGIN: https://dev-compare.da-mr.com
          VITE_IMAGE_GEN_ORIGIN: https://dev-image-gen.da-mr.com

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/main/dist --project-name=playground-dev --branch=main --commit-dirty=true
          workingDirectory: '.'
          packageManager: pnpm

  deploy-resume:
    name: Deploy apps/resume to Cloudflare Pages
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect-changes.outputs.resume == 'true'
    environment:
      name: production
      url: https://resume.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/resume
        run: pnpm turbo run build --filter=@playground/resume
        env:
          VITE_MAIN_ORIGIN: https://da-mr.com

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/resume/dist --project-name=resume --branch=main --commit-dirty=true
          workingDirectory: '.'
          packageManager: pnpm

  deploy-resume-dev:
    name: Deploy apps/resume to Cloudflare Pages (dev)
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.detect-changes.outputs.resume == 'true'
    environment:
      name: development
      url: https://dev-resume.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/resume
        run: pnpm turbo run build --filter=@playground/resume
        env:
          VITE_MAIN_ORIGIN: https://dev.da-mr.com

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/resume/dist --project-name=resume-dev --branch=main --commit-dirty=true
          workingDirectory: '.'
          packageManager: pnpm

  deploy-compare:
    name: Deploy apps/compare (Worker + SPA)
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect-changes.outputs.compare == 'true'
    environment:
      name: production
      url: https://compare.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/compare (client → dist/)
        run: pnpm turbo run build --filter=@playground/compare
        env:
          VITE_MAIN_ORIGIN: https://da-mr.com

      - name: Deploy Worker (static assets + /api)
        run: pnpm --filter @playground/compare-api exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-compare-dev:
    name: Deploy apps/compare (Worker + SPA, dev)
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.detect-changes.outputs.compare == 'true'
    environment:
      name: development
      url: https://dev-compare.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/compare (client → dist/)
        run: pnpm turbo run build --filter=@playground/compare
        env:
          VITE_MAIN_ORIGIN: https://dev.da-mr.com

      - name: Deploy Worker (static assets + /api, dev)
        run: pnpm --filter @playground/compare-api run deploy:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-image-gen:
    name: Deploy apps/image-gen to Cloudflare Pages
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect-changes.outputs.image_gen == 'true'
    environment:
      name: production
      url: https://image-gen.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/image-gen
        run: pnpm turbo run build --filter=@playground/image-gen
        env:
          VITE_MAIN_ORIGIN: https://da-mr.com

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/image-gen/dist --project-name=image-gen --branch=main --commit-dirty=true
          workingDirectory: '.'
          packageManager: pnpm

  deploy-image-gen-dev:
    name: Deploy apps/image-gen to Cloudflare Pages (dev)
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.detect-changes.outputs.image_gen == 'true'
    environment:
      name: development
      url: https://dev-image-gen.da-mr.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @playground/image-gen
        run: pnpm turbo run build --filter=@playground/image-gen
        env:
          VITE_MAIN_ORIGIN: https://dev.da-mr.com

      - name: Install Wrangler for workspace root
        run: pnpm add -Dw wrangler@3.90.0

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/image-gen/dist --project-name=image-gen-dev --branch=main --commit-dirty=true
          workingDirectory: '.'
          packageManager: pnpm

